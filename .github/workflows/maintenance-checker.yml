name: Meralco Planned Maintenance Checker

on:
  schedule:
    - cron: '0 0 */2 * *' # Every 48 hours (at midnight every 2nd day-of-month)
  workflow_dispatch:

jobs:
  check-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Restore Scraper Cache
        uses: actions/cache/restore@v4
        with:
          path: .meralco_advisories_cache.json
          key: maintenance-cache-${{ github.run_id }}
          restore-keys: |
            maintenance-cache-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run Planned Maintenance Checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEARCH_AREAS: ${{ secrets.SEARCH_AREAS }}
        run: |
          python check_maintenance.py "$SEARCH_AREAS" --telegram --silent --notify-always --bot-token "$TELEGRAM_BOT_TOKEN" --chat-id "$TELEGRAM_CHAT_ID" || true

      - name: Save Scraper Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .meralco_advisories_cache.json
          key: maintenance-cache-${{ github.run_id }}
